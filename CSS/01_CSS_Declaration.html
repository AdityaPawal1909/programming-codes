<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Declarations</title>
    <style>
        .internal-style {
            color: green;
            background-color: lightgray;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <h1>CSS Declarations</h1>
    <h2>Inline Styles</h2>
    <p style="color: blue; font-size: 18px; background-color: yellow;">This paragraph has inline styles applied to it.</p>
    <h2>Internal Styles</h2>
    <p class="internal-style">This paragraph has internal styles applied to it.</p>
    <h2>External Styles</h2>
    <link rel="stylesheet" href="cssfiles/style1.css">
    <p class="external-style">This paragraph has external styles applied to it.</p>
</body>
</html>
