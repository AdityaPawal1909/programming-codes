<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS - Box Model</title>
    <style>
        .box {
            border: 2px solid black;
            padding: 10px;
            margin: 10px;
        }
        .box1 {
            background-color: lightblue;
        }
        .box2 {
            background-color: lightgreen;
            padding: 20px;
            margin: 20px;
        }
    </style>
</head>
<body>
    <h1>CSS Box Model</h1>
    <p class="box1 box">This is a simple example of the CSS box model.</p>
    <p class="box2 box">This is another example of the CSS box model with different padding and margin.</p>
</body>
</html>
