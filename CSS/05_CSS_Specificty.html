<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS - Specificity</title>
    <style>
        p {
            color: blue;
        }
        .yellow {
            color: yellow;
        }
        .cred {
            color: red;
        }
        .cblue {
            color: blue;
        }
        [data-x="a"] {
            color: green;
        }
    </style>
</head>
<body>
    <h1>CSS - Specificity</h1>
    <p class="yellow cred cblue" data-x="a">This is a paragraph.</p>

</body>
</html>
