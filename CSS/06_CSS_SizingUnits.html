<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS - Sizing Units</title>
    <style>
        p:first-child {
            font-size: 16px;
            width: 50%;
            height: 100px;
            padding: 10px;
            margin: 20px;
            border: 2px solid black;
        }
        p:nth-child(2) {
            font-size: 1.5em;
            width: 75%;
            height: 150px;
            padding: 15px;
            margin: 25px;
            border: 3px solid blue;
        }
        p:nth-child(3) {
            font-size: 2em;
            width: 100%;
            height: 200px;
            padding: 20px;
            margin: 30px;
            border: 4px solid green;
        }
    </style>
</head>
<body>
    <h1>CSS - Sizing Units</h1>
    <div>
        <p>This is a paragraph.</p>
        <p>This is another paragraph.</p>
        <p>This is yet another paragraph.</p>
    </div>

</body>
</html>
