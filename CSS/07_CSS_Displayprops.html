<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS - Display Properties</title>
    <style>
        .box{
            color: blue;
            background-color: lightgray;
            font-size: 20px;
            display: block;
        }
        .box1 {
            color: red;
            background-color: yellow;
            font-size: 18px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div>
        <h1>CSS - Display Properties</h1>
        <p class="box">This is a paragraph.</p>
        <p class="box1">This is another paragraph.</p>
    </div>
</body>
</html>
