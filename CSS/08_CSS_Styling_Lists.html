<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS  - Styling Lists</title>
    <style>
        .box ul{
            width: 300px;
            height: 200px;
            border: 2px solid #000;
            padding: 20px;
            background-color: red;
            list-style: none;
            list-style-type: square;
        }
    </style>
</head>
<body>
    <div class="box">
        <ul>
            <li>HTML</li>
            <li>CSS</li>
            <li>JavaScript</li>
        </ul>
    </div>
</body>
</html>
