<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS - Position Property</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box1{
            background-color: red;
            /* position: absolute;
            top: 0px;
            left: 0px; */
        }
        .box2{
            background-color: green;
            /* position: relative;
            top: 34px;
            left: 56px; */
        }
        .box3{
            background-color: blue;
            position: fixed;
            top: 25px;
            left: 25px;
        }
        .box4{
            background-color: yellow;
            position: sticky;
        }
        .box {
            width: 80vw;
            height: 133px;
            padding: 3px;
            margin: 3px;
            border: 2px solid black;
        }

        .parent{
            padding: 43px;
            margin: 34px;
            border: 2px solid purple;
            /* position: absolute; */
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
        <div class="box box4"></div>
    </div>
</body>
</html>
