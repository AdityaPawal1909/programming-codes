<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 01 - CSS</title>
    <style>
        p:first-child {
            background-color: yellow;
            color: red;
        }
        p{
            background-color: blue;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Exercise 1: CSS</h1>
    <div>
        <p>This is a simple paragraph.</p>
        <p>This is another paragraph with a different style.</p>
        <p>This is a third paragraph with yet another style.</p>
        <p>This is a fourth paragraph with a unique style.</p>
        <p>This is a fifth paragraph with a special style.</p>

    </div>
</body>
</html>
