<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 02 - CSS</title>
    <style>
        body {
            background-color: grey;
        }

        .card {
            background-color: white;
            width: 197px;
            height: 400px;
            border-radius: 7px;
        }

        .image {
            padding: 5px;

        }

        .image img {
            border-radius: 7px;
        }

        .content {
            padding: 13px;
        }

        .content p {
            font-size: 13px;
            color: grey
        }

        .capsules {
            padding: 0 34px 0 1px;
        }

        .capsules span {
            border: 1px solid grey;
            padding: 1px 4px;
            border-radius: 7px;
            font-size: 12px;
        }
        .button{
            text-align: center;
        }
        .button button{
            color: blue;
            background-color: rgb(127, 127, 226);
            padding:  7px 9px;
            border-radius: 9px;
            border: none;
            font-size: 10px;
            margin-top: 3px;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="image">
            <img width="188px"
                src="https://media.istockphoto.com/id/139870470/photo/fast-drive.jpg?s=612x612&w=0&k=20&c=iRG3qM1gUxiE3u31xEsiEFLyFev2ByjIXn08VMkbQ-M="
                alt="Error">
            <div class="capsules">
                <span>Nature</span>
                <span>Lake</span>
            </div>

            <div class="content">
                <h1 style="font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;">Aditya</h1>
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Eveniet aspernatur iusto aliquam illum
                    labore
                    nostrum, sit veritatis illo non ut dol</p>
                <div class="button">
                    <button>read more</button>
                </div>
            </div>

        </div>
    </div>

</body>

</html>
