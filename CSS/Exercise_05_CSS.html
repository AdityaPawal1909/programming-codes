<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 05 - CSS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 60px;
            border: 1px solid grey;
        }

        .logo img {
            width: 180px;
        }

        .nav {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .nav ul {
            display: flex;
            list-style: none;
            gap: 35px;
        }

        .nav ul li {
            cursor: pointer;
            font-family: sans-serif;
            transition: 0.3s;
        }

        .nav ul li:hover {
            color: #0a84ff;
        }

        .right {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .right button {
            background: #ffd633;
            border: none;
            padding: 14px 28px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: .3s;
        }

        .right button:hover {
            background: #f5c400;
        }

        .right span {
            cursor: pointer;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">
            <img src="https://www.ultraedit.com/wp-content/uploads/2023/01/UE_Logo_full_Black_Trans_High_Res.png"
                alt="">
        </div>
        <nav class="nav">
            <ul>
                <li>Products</li>
                <li>Buy</li>
                <li>Renew</li>
                <li>Support</li>
                <li>Learn</li>
                <li>Company</li>
            </ul>
        </nav>
        <div class="right">
            <button>Download</button>
            <span>🌐 English</span>
            <span>🔍</span>
        </div>
    </header>
</body>

</html>
