<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 07 - CSS</title>
    <style>
        .box{
            height: 121px;
            width: 121px;
            background-color: red;
            border-radius: 70px;
            position: absolute;
            bottom: 0;
            left: 0;
            animation: BounceBall 5s linear 1s infinite alternate ;
        
        }
        .container{
            position: relative;
            height: 84vh;
            width: 84vw;
            background-color: blue;

        }

        @keyframes BounceBall {
            0%{
                transform: translate(0);
            }
            20% {
                transform: translateY(-40vh) translateX(15vw);
            }
            40%{
                transform: translateY(0vh) translateX(30vw);
            }
            60%{
                transform: translateY(-40vh) translateX(45vw);
            }
            80%{
                transform: translateY(0vh) translateX(60vw);
            }
            100%{
                transform: translateY(-40vh) translateX(75vw);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">

        </div>
    </div>
</body>
</html>
