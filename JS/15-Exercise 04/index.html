<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 04</title>
    <style>
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 43px;
        }

        .box {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 90px;
            width: 90px;
            border: 2px solid black;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">Box</div>
        <div class="box">Box</div>
        <div class="box">Box</div>
        <div class="box">Box</div>
        <div class="box">Box</div>
    </div>
    <script>
        let colors = ["red", "green", "Blue", "Brown", "black", "grey", "orange", "purple","pink", "yellow"]
        let box = document.querySelectorAll(".box")
        let size = colors.length

        box.forEach(element => {
            let random = Math.floor(Math.random() * size)
            element.style.color = colors[random]
        });
        box.forEach(element => {
            let random = Math.floor(Math.random() * size)
            element.style.backgroundColor = colors[random]
        });
    </script>
</body>

</html>
